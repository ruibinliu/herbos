<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>HerbOS</title>

    <link href="/static/bootstrap.min.css" rel="stylesheet">

    <script src="/static/socket.io.min.js"></script>

    <style>

        html,
        body {
            height: 100%;
            overflow: hidden;
            background-color: #111827;
        }

        .app-container {
            height: 100vh;
            padding: 16px;
        }

        .card {
            border: none;
            border-radius: 20px;
        }

        .main-content {
            height: calc(100vh - 90px);
        }

        .camera-column {
            height: 100%;
        }

        .camera-card {
            flex: 1;
            min-height: 0;
        }

        .camera-box {

            background: #1f2937;

            border-radius: 16px;

            overflow: hidden;

            display: flex;
            align-items: center;
            justify-content: center;

            height: 100%;

            min-height: 240px;
            max-height: 480px;
        }

        .camera-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .skill-button {
            height: 80px;
            font-size: 1.05rem;
            border-radius: 16px;
        }

        .status-card {
            border-radius: 16px;
        }

        .log-box {
            flex-grow: 1;
            resize: none;
            overflow-y: auto;
            background: #0f172a !important;
            color: #e5e7eb !important;
            border: none !important;
            border-radius: 16px;
            padding: 12px;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .section-title {
            font-size: 1.05rem;
            font-weight: 600;
        }

    </style>

</head>

<body>

<div class="container-fluid app-container">

    <!-- Header -->

    <div class="d-flex justify-content-between align-items-center mb-3">

        <div>

            <h2 class="fw-bold mb-1">
                HerbOS
            </h2>

            <div class="text-secondary">
                Embodied AI Tea System
            </div>

        </div>

        <div class="d-flex gap-2">

            <span class="badge text-bg-success fs-6">
                Robot Connected
            </span>

            <span class="badge text-bg-success fs-6">
                Cameras Ready
            </span>

            <span class="badge text-bg-primary fs-6"
                  id="current-skill">

                Idle

            </span>

        </div>

    </div>

    <!-- Main -->

    <div class="row g-3 main-content">

        <!-- Left Cameras -->
        <div class="col-lg-5">
            <div class="d-flex flex-column gap-3 camera-column">
                <!-- Global Camera -->
                <div class="card bg-dark camera-card">
                    <div class="card-body d-flex flex-column">
                        <div class="section-title mb-3">
                            Global Camera
                        </div>
                        <div class="camera-box flex-grow-1">
                            <img src="https://placehold.co/640x480/png" alt="Global Camera">
                        </div>
                    </div>
                </div>

                <!-- Wrist Camera -->
                <div class="card bg-dark camera-card">
                    <div class="card-body d-flex flex-column">
                        <div class="section-title mb-3">Wrist Camera</div>

                        <div class="camera-box flex-grow-1">
                            <img src="https://placehold.co/640x480/png" alt="Wrist Camera">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="col-lg-7 h-100">
            <div class="d-flex flex-column gap-3 h-100">
                <!-- Runtime Controls -->
                <div class="card bg-dark">
                    <div class="card-body">
                        <div class="section-title mb-3">Runtime Controls</div>
                        <div class="row g-3">
                            <div class="col-6">
                                <button
                                        class="btn btn-outline-success w-100 skill-button"
                                        onclick="startTeleop()">
                                    Start Teleop
                                </button>
                            </div>

                            <div class="col-6">
                                <button
                                        class="btn btn-outline-danger w-100 skill-button"
                                        onclick="stopTeleop()">
                                    Stop Teleop
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Skills -->
                <div class="card bg-dark">
                    <div class="card-body">
                        <div class="section-title mb-3">
                            Skills
                        </div>

                        <div class="row g-3">
                            <div class="col-6">
                                <button
                                        class="btn btn-primary w-100 skill-button"
                                        onclick="runSkill('pick_cup')">
                                    Pick Cup
                                </button>
                            </div>

                            <div class="col-6">
                                <button
                                        class="btn btn-primary w-100 skill-button"
                                        onclick="runSkill('pick_capsule')">
                                    Pick Capsule
                                </button>
                            </div>

                            <div class="col-6">
                                <button
                                        class="btn btn-success w-100 skill-button"
                                        onclick="runSkill('pour_water')">
                                    Pour Water
                                </button>
                            </div>

                            <div class="col-6">
                                <button
                                        class="btn btn-danger w-100 skill-button"
                                        onclick="runSkill('stop')">
                                    STOP
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Status -->
                <div class="card bg-dark">
                    <div class="card-body">
                        <div class="section-title mb-3">
                            Robot Status
                        </div>

                        <div class="row g-3">
                            <div class="col-3">
                                <div class="p-3 bg-secondary status-card">
                                    <div class="text-light-emphasis">
                                        Skill
                                    </div>
                                    <div class="fs-4 fw-bold" id="status-skill">Idle</div>
                                </div>
                            </div>

                            <div class="col-3">
                                <div class="p-3 bg-secondary status-card">
                                    <div class="text-light-emphasis">
                                        Queue
                                    </div>

                                    <div class="fs-4 fw-bold" id="status-queue">0</div>
                                </div>
                            </div>

                            <div class="col-3">
                                <div class="p-3 bg-secondary status-card">
                                    <div class="text-light-emphasis">Robot</div>

                                    <div class="fs-4 fw-bold text-success" id="status-robot">Ready</div>
                                </div>
                            </div>

                            <div class="col-3">
                                <div class="p-3 bg-secondary status-card">
                                    <div class="text-light-emphasis">
                                        Policy
                                    </div>

                                    <div class="fs-4 fw-bold">
                                        ACT
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Logs -->
                <div class="card bg-dark flex-grow-1">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="section-title">
                                Runtime Logs
                            </div>
                            <button
                                    class="btn btn-outline-light btn-sm"
                                    onclick="clearLogs()">
                                Clear
                            </button>
                        </div>
                        <textarea
                                class="log-box form-control"
                                id="log-box"
                                readonly>HerbOS started...</textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>

    const socket = io();

    function appendLog(message) {
        const logBox = document.getElementById("log-box");
        const time = new Date().toLocaleTimeString();
        logBox.value += `[${time}] ${message}\n`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    function clearLogs() {
        document.getElementById("log-box").value = "";
    }

    function startTeleop() {

        appendLog("Starting teleop...");

        socket.emit("start_teleop");
    }


    function stopTeleop() {

        appendLog("Stopping teleop...");

        socket.emit("stop_teleop");
    }

    function runSkill(skill) {

        appendLog(`Queue skill: ${skill}`);

        socket.emit("run_skill", {
            skill: skill
        });
    }

    socket.on("log", (data) => {
        appendLog(data.message);
    });

    socket.on("status", (data) => {
        if (data.current_skill) {
            document.getElementById(
                "status-skill"
            ).innerText = data.current_skill;
        }

        if (data.robot_state) {
            document.getElementById(
                "status-robot"
            ).innerText = data.robot_state;
        }
    });

</script>
</body>
</html>
