<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HerbOS</title>
    <link href="/static/bootstrap.min.css" rel="stylesheet">
    <script src="/static/socket.io.min.js"></script>
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
            background-color: #111827;
        }

        .app-container {
            height: 100vh;
            padding: 16px;
        }

        .card {
            border: none;
            border-radius: 20px;
        }

        .main-content {
            height: calc(100vh - 90px);
        }

        .camera-column {
            height: 100%;
        }

        .camera-card {
            flex: 1;
            min-height: 0;
        }

        .camera-box {
            background: #1f2937;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 240px;
            max-height: 480px;
        }

        .camera-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-skill {
            height: 60px;
            font-size: 1.05rem;
            border-radius: 16px;
        }

        .status-card {
            border-radius: 16px;
        }

        .log-box {
            flex-grow: 1;
            resize: none;
            overflow-y: auto;
            background: #0f172a !important;
            color: #e5e7eb !important;
            border: none !important;
            border-radius: 16px;
            padding: 12px;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .section-title {
            font-size: 1.05rem;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="container-fluid app-container">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="fw-bold mb-1">
                HerbOS
            </h2>
            <div class="text-secondary">Embodied AI Healthy Drink System</div>
        </div>
        <div class="d-flex gap-2">
            <span class="badge text-bg-success fs-6">Robot Connected</span>
            <span class="badge text-bg-success fs-6">Cameras Ready</span>
            <span class="badge text-bg-primary fs-6" id="current-skill">Idle</span>
        </div>
    </div>

    <!-- Main -->
    <div class="row g-3 main-content">
        <!-- Left Cameras -->
        <div class="col-lg-6">
            <div class="d-flex flex-column gap-3 h-100">
                <!-- Runtime Controls -->
                <div class="card bg-dark">
                    <div class="card-body">
                        <div class="section-title mb-3">基本控制</div>
                        <div class="row g-3">
                            <div class="col-6">
                                <button class="btn btn-primary w-100 btn-skill" onclick="startTeleop()">遥操</button>
                            </div>

                            <div class="col-6">
                                <button class="btn btn-danger w-100 btn-skill" onclick="stopTeleop()">停止</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card bg-dark">
                    <div class="card-body">
                        <div class="section-title mb-3">数据集</div>

                        <div class="row g-3">
                            <form>
                                <div class="d-grid gap-2 col-6 mx-auto">
                                    <div class="mb-3">
                                        <label for="skillSelect" class="form-label">请选择场景类型</label>
                                        <select class="form-select form-select-lg" aria-label="Large select example"
                                                id="skillSelect">
                                            <option value="1" selected="selected">取杯</option>
                                            <option value="2">取胶囊</option>
                                            <option value="3">萃取</option>
                                            <option value="4">上盖</option>
                                            <option value="5">出货</option>
                                        </select>
                                    </div>

                                    <button class="btn btn-primary btn-skill" onclick="startTeleop()">开始采集</button>
                                    <button class="btn btn-danger btn-skill" onclick="stopTeleop()">停止</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Skills -->
                <div class="card bg-dark">
                    <div class="card-body">
                        <div class="section-title mb-3">模型</div>

                        <div class="d-grid gap-2 col-6 mx-auto">
                            <button class="btn btn-primary btn-skill" onclick="runSkill('pick_cup')">取杯</button>
                            <button class="btn btn-primary btn-skill" onclick="runSkill('pick_capsule')">取胶囊</button>
                            <button class="btn btn-primary btn-skill" onclick="runSkill('brew')">萃取</button>
                            <button class="btn btn-primary btn-skill" onclick="runSkill('apply_lid')">上盖</button>
                            <button class="btn btn-success btn-skill" onclick="runSkill('serve')">出货</button>
                            <button class="btn btn-danger btn-skill" onclick="runSkill('stop')">停止</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="col-lg-6 h-100">


            <!-- Status -->
            <div class="card bg-dark">
                <div class="card-body">
                    <div class="section-title mb-3">系统状态</div>

                    <div class="row g-3">
                        <div class="col-3">
                            <div class="p-3 bg-secondary status-card">
                                <div class="text-light-emphasis">
                                    样本数量
                                </div>
                                <div class="fs-4 fw-bold" id="status-skill">0</div>
                            </div>
                        </div>

                        <div class="col-3">
                            <div class="p-3 bg-secondary status-card">
                                <div class="text-light-emphasis">
                                    模型数量
                                </div>

                                <div class="fs-4 fw-bold" id="status-queue">5</div>
                            </div>
                        </div>

                        <div class="col-3">
                            <div class="p-3 bg-secondary status-card">
                                <div class="text-light-emphasis">机器人</div>

                                <div class="fs-4 fw-bold text-success" id="status-robot">就绪</div>
                            </div>
                        </div>

                        <div class="col-3">
                            <div class="p-3 bg-secondary status-card">
                                <div class="text-light-emphasis">策略</div>
                                <div class="fs-4 fw-bold">ACT</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Logs -->
            <div class="card bg-dark">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="section-title">
                            Runtime Logs
                        </div>
                        <button class="btn btn-outline-light btn-sm" onclick="clearLogs()">Clear</button>
                    </div>
                    <textarea class="log-box form-control" id="log-box" readonly>HerbOS started...</textarea>
                </div>
            </div>
        </div>
    </div>
</div>

<script>

    const socket = io();

    function appendLog(message) {
        const logBox = document.getElementById("log-box");
        const time = new Date().toLocaleTimeString();
        logBox.value += `[${time}] ${message}\n`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    function clearLogs() {
        document.getElementById("log-box").value = "";
    }

    function startTeleop() {

        appendLog("Starting teleop...");

        socket.emit("start_teleop");
    }


    function stopTeleop() {

        appendLog("Stopping teleop...");

        socket.emit("stop_teleop");
    }

    function runSkill(skill) {

        appendLog(`Queue skill: ${skill}`);

        socket.emit("run_skill", {
            skill: skill
        });
    }

    socket.on("log", (data) => {
        appendLog(data.message);
    });

    socket.on("status", (data) => {
        if (data.current_skill) {
            document.getElementById(
                "status-skill"
            ).innerText = data.current_skill;
        }

        if (data.robot_state) {
            document.getElementById(
                "status-robot"
            ).innerText = data.robot_state;
        }
    });

</script>
</body>
</html>
